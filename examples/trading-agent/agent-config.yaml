agent:
  name: "MyAgent"
  strategy: "arbitrage-internal"

network:
  chain_id: 84532
  rpc_url: "${RPC_URL}"

mcp:
  lockstep_server: "http://localhost:3100"
  uniswap_server: "https://mcp.uniswap.org"

wallet:
  private_key: "${AGENT_PRIVATE_KEY}"

risk:
  max_position_size: 0.20
  max_total_exposure: 0.80
  stop_loss_pct: 0.05
  max_drawdown_pct: 0.15

trading:
  pools:
    - "ETH/USDC"
    - "WBTC/USDC"
  min_profit_threshold: 0.002
  check_interval_seconds: 30

reporting:
  pnl_report_interval: 3600
